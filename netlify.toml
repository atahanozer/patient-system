# Netlify build config. The frontend lives in frontend/; pinning `base` here means
# Netlify builds the Next.js app (not the repo root, which only holds tooling).
# The Next.js runtime plugin handles SSR/routing/redirects.
[build]
  base = "frontend"
  command = "npm run build"
  # Relative to `base`, so this is frontend/.next — must differ from the base dir,
  # otherwise the Next plugin errors ("publish cannot equal base").
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
